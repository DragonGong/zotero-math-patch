<svg xmlns="http://www.w3.org/2000/svg" width="1280" height="760" viewBox="0 0 1280 760" role="img" aria-labelledby="title desc">
  <title id="title">Markdown math conversion preview</title>
  <desc id="desc">A sanitized before and after preview of Markdown math converted to Zotero math nodes.</desc>
  <defs>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="16" stdDeviation="22" flood-color="#0f172a" flood-opacity="0.16"/>
    </filter>
    <linearGradient id="bg" x1="0" x2="1" y1="0" y2="1">
      <stop offset="0" stop-color="#edf5ff"/>
      <stop offset="1" stop-color="#f8fafc"/>
    </linearGradient>
  </defs>
  <style>
    text {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      fill: #162033;
    }
    .mono {
      font-family: ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, monospace;
    }
    .heading {
      font-size: 34px;
      font-weight: 800;
    }
    .label {
      font-size: 20px;
      font-weight: 750;
      fill: #ffffff;
    }
    .body {
      font-size: 24px;
    }
    .code {
      font-size: 22px;
      fill: #334155;
    }
    .muted {
      fill: #64748b;
    }
  </style>
  <rect width="1280" height="760" fill="url(#bg)"/>

  <g filter="url(#shadow)" transform="translate(70 74)">
    <rect width="520" height="610" rx="20" fill="#ffffff" stroke="#d9e2ec"/>
    <rect width="520" height="72" rx="20" fill="#0f766e"/>
    <text x="30" y="47" class="heading" fill="#ffffff">Before</text>
    <text x="30" y="112" class="body muted">Pasted Markdown note</text>
    <rect x="30" y="142" width="460" height="408" rx="12" fill="#f8fafc" stroke="#e2e8f0"/>
    <text x="58" y="188" class="mono code"># Math note</text>
    <text x="58" y="232" class="mono code">This defines $R_{\text{name}}$.</text>
    <text x="58" y="290" class="mono code">$$R_{\text{format}} = 1$$</text>
    <text x="58" y="348" class="mono code">$$ R_{\text{name}} = \frac{|N_G \cap N_P|}{|N_G \cup N_P|} $$</text>
    <text x="58" y="420" class="mono code">```latex</text>
    <text x="58" y="462" class="mono code">$$R_{\text{format}} = 1$$</text>
    <text x="58" y="504" class="mono code">```</text>
    <rect x="30" y="574" width="210" height="30" rx="15" fill="#ccfbf1"/>
    <text x="50" y="596" class="label" fill="#115e59">raw delimiters</text>
  </g>

  <g transform="translate(612 348)">
    <path d="M0 32 H78" stroke="#2563eb" stroke-width="9" stroke-linecap="round"/>
    <path d="M58 8 L96 32 L58 56 Z" fill="#2563eb"/>
  </g>

  <g filter="url(#shadow)" transform="translate(690 74)">
    <rect width="520" height="610" rx="20" fill="#ffffff" stroke="#d9e2ec"/>
    <rect width="520" height="72" rx="20" fill="#2563eb"/>
    <text x="30" y="47" class="heading" fill="#ffffff">After</text>
    <text x="30" y="112" class="body muted">Zotero math nodes</text>
    <rect x="30" y="142" width="460" height="408" rx="12" fill="#ffffff" stroke="#e2e8f0"/>
    <text x="58" y="188" class="body" font-weight="700">Math note</text>
    <text x="58" y="232" class="body">This defines</text>
    <rect x="198" y="204" width="174" height="40" rx="10" fill="#eef2ff" stroke="#c7d2fe"/>
    <text x="214" y="232" class="mono code" fill="#1e3a8a">R_{\text{name}}</text>
    <text x="382" y="232" class="body">.</text>
    <rect x="58" y="270" width="404" height="86" rx="12" fill="#eff6ff" stroke="#bfdbfe"/>
    <text x="186" y="326" class="mono" font-size="28" font-weight="700" fill="#1e3a8a">R_format = 1</text>
    <rect x="58" y="384" width="404" height="96" rx="12" fill="#eff6ff" stroke="#bfdbfe"/>
    <text x="91" y="443" class="mono" font-size="24" font-weight="700" fill="#1e3a8a">R_name = |N_G cap N_P| / |N_G cup N_P|</text>
    <rect x="58" y="500" width="236" height="32" rx="8" fill="#f1f5f9"/>
    <text x="74" y="523" class="mono code">code block unchanged</text>
    <rect x="30" y="574" width="230" height="30" rx="15" fill="#dbeafe"/>
    <text x="50" y="596" class="label" fill="#1d4ed8">renderable math</text>
  </g>
</svg>
